<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODA AI - Build Your Website Fast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 10px;
        }
        .tagline {
            font-size: 1.1rem;
            color: #4b5563;
            margin-bottom: 30px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .welcome-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .login-btn {
            background: #24292e;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background: #1a1d20;
        }
        .login-btn img {
            width: 20px;
            height: 20px;
        }
        .ai-models {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .model-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .model-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .model-name {
            font-weight: 600;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .model-desc {
            font-size: 0.9rem;
            color: #64748b;
        }
        .prompt-section {
            margin-top: 30px;
        }
        .prompt-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .generate-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        .generate-btn:hover {
            background: #1d4ed8;
        }
        .history-section {
            margin-top: 30px;
        }
        .history-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #1e293b;
        }
        .history-list {
            list-style: none;
        }
        .history-item {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #dc2626;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .code-output {
            padding: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: auto;
            max-height: 60vh;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transform: translateX(200%);
            transition: transform 0.3s ease-out;
            z-index: 2000;
        }
        .notification.show {
            transform: translateX(0);
        }
        .notification.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-column">
            <div class="header">
                <div class="logo">CODA AI</div>
                <div class="tagline">Build your website fast and free</div>
            </div>
            
            <div class="login-card" id="loginCard">
                <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-avatar/avatars/kimi.webp" alt="KIMI-K2 Avatar" class="avatar">
                <h2>KIMI-K2</h2>
                <button class="login-btn" id="loginBtn">
                    <span>Login with GitHub</span>
                </button>
                <p style="margin-top: 20px; color: #64748b; text-align: center;">You need to login to use this AI. Click the button below to continue.</p>
            </div>
            
            <div class="welcome-card" id="welcomeCard" style="display: none;">
                <div class="user-info">
                    <img src="" alt="User Avatar" class="user-avatar" id="userAvatar">
                    <span id="username"></span>
                </div>
                
                <div class="ai-models">
                    <div class="model-card">
                        <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-avatar/avatars/kimi.webp" alt="KIMI-K2">
                        <div class="model-name">KIMI-K2</div>
                        <div class="model-desc">Advanced code generation model</div>
                    </div>
                    <div class="model-card">
                        <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/light/qwen-color.png" alt="Qwen Coder">
                        <div class="model-name">Qwen Coder</div>
                        <div class="model-desc">Specialized for coding tasks</div>
                    </div>
                    <div class="model-card">
                        <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-avatar/avatars/deepseek.webp" alt="Deepseek">
                        <div class="model-name">Deepseek</div>
                        <div class="model-desc">High-performance coding assistant</div>
                    </div>
                </div>
                
                <div class="prompt-section">
                    <textarea class="prompt-input" id="promptInput" placeholder="Describe what kind of website or application you want to build..."></textarea>
                    <select id="modelSelect" class="prompt-input">
                        <option value="KIMI-K2">KIMI-K2</option>
                        <option value="Qwen Coder">Qwen Coder</option>
                        <option value="Deepseek">Deepseek</option>
                    </select>
                    <button class="generate-btn" id="generateBtn">Generate Code</button>
                </div>
                
                <div class="history-section">
                    <h3 class="history-title">Recent History</h3>
                    <ul class="history-list" id="historyList"></ul>
                </div>
                
                <div class="status-bar">
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
        
        <div class="right-column">
            <h2>Preview</h2>
            <iframe id="previewFrame" style="width: 100%; height: 80vh; border: 1px solid #cbd5e1; border-radius: 8px;"></iframe>
        </div>
    </div>
    
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div class="code-output" id="codeOutput"></div>
        </div>
    </div>
    
    <div class="notification" id="notification">Operation successful!</div>
    
    <script>
        // Configuration
        const CONFIG = {
            API_BASE: 'https://coda-ai-worker.vildaesa.workers.dev',
            FRONTEND_URL: 'https://vildaesa.github.io/coda-ai/'
        };
        
        // DOM Elements
        const loginCard = document.getElementById('loginCard');
        const welcomeCard = document.getElementById('welcomeCard');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameEl = document.getElementById('username');
        const userAvatar = document.getElementById('userAvatar');
        const promptInput = document.getElementById('promptInput');
        const modelSelect = document.getElementById('modelSelect');
        const generateBtn = document.getElementById('generateBtn');
        const historyList = document.getElementById('historyList');
        const resultModal = document.getElementById('resultModal');
        const closeModal = document.getElementById('closeModal');
        const codeOutput = document.getElementById('codeOutput');
        const notification = document.getElementById('notification');
        const previewFrame = document.getElementById('previewFrame');
        
        // State
        let currentUser = null;
        
        // Initialize app
        async function initApp() {
            checkAuthStatus();
        }
        
        // Check authentication status
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/me`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to check auth status');
                }
                
                const data = await response.json();
                
                if (data.loggedIn) {
                    currentUser = data.user;
                    showWelcomeScreen();
                } else {
                    showLoginScreen();
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                showLoginScreen();
            }
        }
        
        // Show login screen
        function showLoginScreen() {
            loginCard.style.display = 'flex';
            welcomeCard.style.display = 'none';
            currentUser = null;
        }
        
        // Show welcome screen
        function showWelcomeScreen() {
            loginCard.style.display = 'none';
            welcomeCard.style.display = 'block';
            usernameEl.textContent = currentUser.username;
            userAvatar.src = currentUser.avatar;
            loadHistory();
        }
        
        // Handle login
        function handleLogin() {
            window.location.href = `${CONFIG.API_BASE}/auth/github`;
        }
        
        // Handle logout
        async function handleLogout() {
            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showLoginScreen();
                    showNotification('Logged out successfully!', 'success');
                } else {
                    throw new Error('Logout failed');
                }
            } catch (error) {
                console.error('Logout error:', error);
                showNotification('Logout failed. Please try again.', 'error');
            }
        }
        
        // Load history
        async function loadHistory() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/history`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load history');
                }
                
                const data = await response.json();
                renderHistory(data.history);
            } catch (error) {
                console.error('History load failed:', error);
            }
        }
        
        // Render history
        function renderHistory(history) {
            historyList.innerHTML = '';
            
            if (!history || history.length === 0) {
                historyList.innerHTML = '<li class="history-item">No history yet</li>';
                return;
            }
            
            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                const truncatedPrompt = item.prompt.length > 50 ? 
                    item.prompt.substring(0, 50) + '...' : 
                    item.prompt;
                
                li.innerHTML = `
                    <div><strong>${item.model}</strong></div>
                    <div style="font-size: 0.9rem; color: #64748b;">${truncatedPrompt}</div>
                    <div style="margin-top: 8px;">
                        <small style="color: #94a3b8;">${new Date(item.timestamp).toLocaleString()}</small>
                        <button onclick="viewResult('${item.code}', '${item.projectUrl}')" 
                                style="background: #e2e8f0; border: none; padding: 4px 8px; border-radius: 4px; margin-left: 10px; cursor: pointer;">View</button>
                    </div>
                `;
                
                historyList.appendChild(li);
            });
        }
        
        // Generate code
        async function generateCode() {
            const prompt = promptInput.value.trim();
            const model = modelSelect.value;
            
            if (!prompt) {
                showNotification('Please enter a prompt', 'error');
                return;
            }
            
            if (!currentUser) {
                showNotification('Please log in first', 'error');
                return;
            }
            
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';
            
            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ prompt, model })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Display result in modal
                    viewResult(data.code, data.projectUrl);
                    
                    // Update history
                    loadHistory();
                    
                    // Clear input
                    promptInput.value = '';
                    
                    // Update preview
                    previewFrame.src = data.projectUrl;
                    
                    showNotification('Code generated successfully!', 'success');
                } else {
                    throw new Error(data.error || 'Generation failed');
                }
            } catch (error) {
                console.error('Generation error:', error);
                showNotification(`Generation failed: ${error.message}`, 'error');
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Code';
            }
        }
        
        // View result
        function viewResult(code, projectUrl) {
            codeOutput.textContent = code;
            resultModal.style.display = 'flex';
            
            // Also update preview frame
            if (projectUrl) {
                previewFrame.src = projectUrl;
            }
        }
        
        // Close modal
        function closeResultModal() {
            resultModal.style.display = 'none';
        }
        
        // Show notification
        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.className = 'notification';
            
            if (type === 'error') {
                notification.classList.add('error');
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // Event listeners
        loginBtn.addEventListener('click', handleLogin);
        logoutBtn.addEventListener('click', handleLogout);
        generateBtn.addEventListener('click', generateCode);
        closeModal.addEventListener('click', closeResultModal);
        
        // Close modal when clicking outside content
        resultModal.addEventListener('click', (e) => {
            if (e.target === resultModal) {
                closeResultModal();
            }
        });
        
        // Initialize the app
        initApp();
    </script>
</body>
</html>
