<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - CODA code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background:#121212; color:#f0f0f0; padding:30px 20px; }
    .container { max-width:900px; margin:0 auto; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
    .header h1 { font-size:28px; font-weight:500; }
    .header .user-info { display:flex; align-items:center; gap:12px; }
    .header .user-info img { width:36px; height:36px; border-radius:50%; }
    .header .user-info span { font-size:14px; color:#aaa; }
    .header .btn-logout { background:#2a2a2a; border:1px solid #444; color:#ccc; padding:6px 16px; border-radius:8px; cursor:pointer; font-size:13px; }
    .header .btn-logout:hover { background:#3a3a3a; }
    .project-list { display:flex; flex-direction:column; gap:14px; }
    .project-item { background:#1a1a1a; border:1px solid #2d2d2d; border-radius:14px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; transition: background 0.2s; }
    .project-item:hover { background:#222; }
    .project-info { display:flex; flex-direction:column; gap:4px; }
    .project-prompt { font-size:15px; font-weight:500; color:#e0e0e0; }
    .project-meta { font-size:12px; color:#888; display:flex; gap:16px; }
    .project-meta i { margin-right:4px; }
    .project-actions { display:flex; gap:10px; }
    .project-actions a, .project-actions button { background:transparent; border:none; color:#61b8c1; text-decoration:none; font-size:14px; cursor:pointer; padding:6px 12px; border-radius:6px; transition: background 0.2s; }
    .project-actions a:hover, .project-actions button:hover { background:rgba(97,184,193,0.1); }
    .project-actions .delete-btn { color:#e74c3c; }
    .project-actions .delete-btn:hover { background:rgba(231,76,60,0.1); }
    .empty-state { text-align:center; padding:60px 20px; color:#777; }
    .empty-state i { font-size:48px; margin-bottom:16px; }
    .back-link { color:#61b8c1; text-decoration:none; font-size:14px; display:inline-block; margin-top:20px; }
    .back-link i { margin-right:6px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-code" style="color:#61b8c1; margin-right:10px;"></i>Dashboard Project</h1>
    <div class="user-info">
      <img id="user-avatar" src="" alt="avatar" />
      <span id="user-name"></span>
      <button class="btn-logout" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div id="project-list-container">
    <div class="empty-state" id="empty-state">
      <i class="fas fa-folder-open"></i>
      <p>Belum ada project. Kembali ke halaman utama untuk membuat website.</p>
      <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Generator</a>
    </div>
    <div class="project-list" id="project-list"></div>
  </div>
</div>

<script>
  const API_BASE = 'https://coda-ai-worker.vildaesa.workers.dev';

  async function fetchHistory() {
    const res = await fetch(`${API_BASE}/api/history`, { credentials: 'include' });
    if (!res.ok) {
      if (res.status === 401) {
        window.location.href = 'index.html?error=login_required';
        return;
      }
      const err = await res.json();
      alert('Gagal mengambil history: ' + (err.error || 'Unknown error'));
      return;
    }
    const data = await res.json();
    return data.history || [];
  }

  async function loadDashboard() {
    // Cek login
    const meRes = await fetch(`${API_BASE}/api/me`, { credentials: 'include' });
    if (meRes.ok) {
      const me = await meRes.json();
      if (me.loggedIn) {
        document.getElementById('user-name').textContent = me.user.username;
        document.getElementById('user-avatar').src = me.user.avatar;
      } else {
        window.location.href = 'index.html?error=not_logged_in';
        return;
      }
    } else {
      window.location.href = 'index.html?error=session_expired';
      return;
    }

    // Ambil history
    const history = await fetchHistory();
    const list = document.getElementById('project-list');
    const empty = document.getElementById('empty-state');

    if (!history || history.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = history.map((item, index) => {
      const date = new Date(item.timestamp);
      const dateStr = date.toLocaleDateString('id-ID') + ' ' + date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      return `
        <div class="project-item">
          <div class="project-info">
            <div class="project-prompt">${item.prompt || 'Tanpa prompt'}</div>
            <div class="project-meta">
              <span><i class="fas fa-calendar"></i> ${dateStr}</span>
              <span><i class="fas fa-cube"></i> ${item.model || 'KIMI-K2'}</span>
              <span><i class="fas fa-link"></i> <a href="${item.projectUrl}" target="_blank" style="color:#61b8c1;">Lihat</a></span>
            </div>
          </div>
          <div class="project-actions">
            <a href="${item.projectUrl}" target="_blank"><i class="fas fa-eye"></i> Preview</a>
            <button class="delete-btn" data-index="${index}"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `;
    }).join('');

    // Event listener untuk tombol delete (opsional, belum implementasi delete di backend)
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = this.dataset.index;
        if (confirm('Hapus project ini?')) {
          // Belum ada endpoint delete, nanti bisa ditambahkan
          alert('Fitur hapus belum tersedia di backend.');
        }
      });
    });
  }

  // Logout
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch(`${API_BASE}/api/logout`, { method: 'POST', credentials: 'include' });
    window.location.href = 'index.html';
  });

  loadDashboard();
</script>
</body>
</html>
